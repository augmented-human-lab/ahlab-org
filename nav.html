<!-- Drawer is intentionally a SIBLING of <nav>, not a child. The nav has
     a `mask-image` that fades its bottom 40% to transparent — if the drawer
     lived inside the nav it would inherit the mask + stacking context and
     get clipped to a thin white sliver around the hamburger row, leaving
     the rest of the drawer visually behind the hero. As a body-level
     sibling, the drawer's own z-index (set high in CSS) wins cleanly. -->
<div class="nav-drawer" id="navDrawer" aria-hidden="true">
  <a class="nav-drawer-logo" href="/" aria-label="AHLab">
    <img src="https://ahlab.org/wp-content/uploads/2021/03/Group-4@2x.png" alt="AHLab">
  </a>
  <ul class="nav-drawer-grid">
    <li><a href="/">Home</a></li>
    <li><a href="/vision/">Vision</a></li>
    <li><a href="/projects/">Projects</a></li>
    <li><a href="/publications/">Publications</a></li>
    <li><a href="/people/">People</a></li>
    <li><a href="/press/">Press &amp; Awards</a></li>
    <li><a href="/join/">Join Us</a></li>
  </ul>
</div>

<script>
/*
 * Nav drawer toggle + active-link auto-center.
 *
 * Runs once per page when nav.html is mounted by /js/nav-include.js.
 * Wires up:
 *   - hamburger button → slides the full-screen drawer in/out via .open
 *   - active link in mobile carousel → marks .active and scrolls it into
 *     view (browser clamps at edges, so Home stays at left and Join at right)
 *
 * Idempotent: if the script runs twice (e.g. SPA-style re-mount), the
 * data attribute prevents stacking duplicate listeners.
 */
(function () {
  var toggle = document.getElementById('navToggle');
  var drawer = document.getElementById('navDrawer');
  var navLinksEl = document.getElementById('navLinks');

  // ── Active link marking + horizontal centering ─────────────
  // On the mobile carousel we want the active link visually distinct
  // (the .active CSS rule scales it up + adds the underline) AND
  // scrolled into view. Browser clamps at the natural scroll edges,
  // so Home (first) won't be force-centered — it stays at the left
  // edge with the next links visible to its right. Same goes for
  // Join Us at the right edge. Anything in the middle gets centered.
  if (navLinksEl) {
    var here = location.pathname.replace(/\/+$/, '/') || '/';
    var links = navLinksEl.querySelectorAll('a[data-path]');
    var activeLink = null;
    links.forEach(function (a) {
      var p = (a.getAttribute('data-path') || '').replace(/\/+$/, '/') || '/';
      if (p === here) { a.classList.add('active'); activeLink = a; }
    });

    if (activeLink) {
      // Defer to next frame so layout is settled (especially the carousel's
      // scrollWidth) before we ask the browser to scroll.
      requestAnimationFrame(function () {
        var bar = navLinksEl;
        var target = activeLink.offsetLeft - (bar.clientWidth / 2) + (activeLink.clientWidth / 2);
        // No need to clamp manually — the browser refuses to scroll past
        // the natural edges (0 to scrollWidth - clientWidth).
        bar.scrollTo({ left: target, behavior: 'instant' in bar.scrollTo ? 'instant' : 'auto' });
      });
    }
  }

  // ── Drawer toggle ──────────────────────────────────────────
  if (!toggle || !drawer) return;
  if (toggle.dataset.bound === '1') return;
  toggle.dataset.bound = '1';

  function setOpen(open) {
    drawer.classList.toggle('open', open);
    toggle.setAttribute('aria-expanded', open ? 'true' : 'false');
    drawer.setAttribute('aria-hidden', open ? 'false' : 'true');
    // Lock body scroll while the drawer is up so the underlying page
    // doesn't scroll behind the overlay.
    document.documentElement.style.overflow = open ? 'hidden' : '';
  }

  toggle.addEventListener('click', function () {
    setOpen(!drawer.classList.contains('open'));
  });

  // Tapping a link inside the drawer should also dismiss the overlay
  // (the link will navigate immediately afterwards on its own).
  drawer.addEventListener('click', function (e) {
    if (e.target.closest('a')) setOpen(false);
  });

  // ESC dismisses the drawer when it's open.
  document.addEventListener('keydown', function (e) {
    if (e.key === 'Escape' && drawer.classList.contains('open')) setOpen(false);
  });
})();

/* ──────────────────────────────────────────────────────────
 * Hero parallax-on-tilt
 *
 * On phones with a working device-orientation sensor, the hero
 * background image gently scrolls horizontally as the user tilts
 * their device — revealing the cropped edges of the photo.
 *
 * Activates whenever:
 *   - the page has a .hero element
 *   - the device fires deviceorientation events (or its absolute
 *     variant, which some Android browsers prefer)
 *   - the user hasn't asked for reduced motion
 *
 * No viewport-width gate: we let the sensor itself decide whether
 * to fire. Desktop browsers typically don't dispatch these events
 * unless the user has a tablet-mode laptop with a real sensor, in
 * which case the parallax is welcome anyway.
 *
 * iOS 13+ requires DeviceOrientationEvent.requestPermission() inside
 * a user gesture handler. We don't prompt — the effect is decorative
 * enough that requiring an explicit "allow motion" tap would be more
 * annoying than the effect is worth. iOS users who haven't already
 * granted permission see a static hero (unchanged from before).
 *
 * Updates a CSS variable --hero-tilt-x on each .hero element; the
 * hero's background-position references that variable. CSS handles
 * easing via a transition on background-position.
 *
 * Debug: append ?parallax-debug=1 to the URL to log sensor events
 * to the console — useful for confirming whether the device is
 * actually firing the right events (Chrome on Android requires HTTPS
 * for sensors; the listener attaches silently but no events arrive
 * over plain HTTP).
 * ────────────────────────────────────────────────────────── */
(function () {
  if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;

  var heroes = document.querySelectorAll('.hero');
  if (heroes.length === 0) return;

  var DEBUG = /[?&]parallax-debug=1\b/.test(location.search);
  var log = DEBUG ? function () { console.log.apply(console, ['[parallax]'].concat([].slice.call(arguments))); } : function () {};

  // Tilt sensitivity. gamma is roll (left/right tilt) in degrees,
  // typically -90…+90 in portrait. We map ±20° to ±50px horizontal
  // background shift; deeper tilts get clamped so the image never
  // reveals empty edge.
  var MAX_TILT_DEG = 20;
  var MAX_SHIFT_PX = 50;

  // Latest target shift (set by orientation events). A separate rAF
  // loop applies it to the DOM, so DOM updates are decoupled from
  // sensor sample rate (which can spike above 60 Hz on some devices).
  var targetShift = 0;
  var currentShift = 0;
  var rafScheduled = false;

  function clamp(v, min, max) { return v < min ? min : v > max ? max : v; }

  function applyShift() {
    rafScheduled = false;
    // Light low-pass filter for extra smoothness on top of the CSS
    // transition. Approaches the target by ~25% per frame.
    currentShift += (targetShift - currentShift) * 0.25;
    if (Math.abs(targetShift - currentShift) > 0.1) {
      heroes.forEach(function (h) {
        h.style.setProperty('--hero-tilt-x', currentShift.toFixed(1) + 'px');
      });
      rafScheduled = true;
      requestAnimationFrame(applyShift);
    } else {
      // Snap to exact target on the last frame
      currentShift = targetShift;
      heroes.forEach(function (h) {
        h.style.setProperty('--hero-tilt-x', currentShift.toFixed(1) + 'px');
      });
    }
  }

  var firstEvent = true;
  function onOrientation(e) {
    // gamma is the left/right tilt. Some browsers send beta/gamma as
    // null for the first event or two while sensors warm up — skip
    // those instead of bailing entirely.
    if (e.gamma == null) {
      if (firstEvent) log('first event arrived but gamma is null — sensor warming up');
      return;
    }
    if (firstEvent) {
      log('first valid event:', { alpha: e.alpha, beta: e.beta, gamma: e.gamma, absolute: e.absolute });
      firstEvent = false;
    }

    var ratio = clamp(e.gamma / MAX_TILT_DEG, -1, 1);
    targetShift = ratio * MAX_SHIFT_PX;

    if (!rafScheduled) {
      rafScheduled = true;
      requestAnimationFrame(applyShift);
    }
  }

  // Try both the standard event and the "absolute" variant. Some
  // Android browsers (Samsung Internet, older Chromes) only dispatch
  // one or the other.
  window.addEventListener('deviceorientation', onOrientation, { passive: true });
  window.addEventListener('deviceorientationabsolute', onOrientation, { passive: true });

  log('parallax wired. Tilt the device to test. If nothing happens:');
  log(' • iOS: requires explicit user-gesture permission (not implemented)');
  log(' • Android: requires HTTPS — sensor events are blocked on plain HTTP');
  log(' • Some browsers require the page to be the active tab + focused');

  // Sanity: warn if we never see a single event in the first 3 seconds.
  if (DEBUG) {
    setTimeout(function () {
      if (firstEvent) log('⚠ no orientation events received after 3s — sensor likely unavailable / blocked');
    }, 3000);
  }
})();
</script>
