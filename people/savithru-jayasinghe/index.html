<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://use.typekit.net/zws2qzx.css">
<link rel="stylesheet" href="/css/theme.css">

<link rel="icon" href="https://ahlab.org/wp-content/uploads/2021/05/cropped-Group@2x-32x32.png" sizes="32x32">

</head>
<body>

<div id="site-nav-mount"></div>
<script src="/js/nav-include.js"></script>

<!-- PAGE -->
<div class="container">

  <!-- Hero -->
  <section class="profile-hero rv">
    <div class="profile-hero-grid">
      <div class="profile-photo">
        <img src="https://cdn.ahlab.org/media/site/people/savithru-jayasinghe/savithru-jayasinghe.jpg" alt="Savithru Jayasinghe">
      </div>
      <div class="profile-info">
        <h1>Savithru Jayasinghe</h1>
        <div class="profile-role">Research Attachment</div>
        
        
      </div>
    </div>
  </section>

  <!-- Body -->
  <section class="profile-body">
    <div class="profile-intro-grid">
        <div class="profile-content rv">
        <p>Savithtu was Cambridge-MIT exchange student who did a UROP with the group.</p>
      </div>
        <aside class="profile-featured rv rv-d1" aria-label="Featured project">
        <div class="sidebar-section-title">Featured project</div>
        <a href="/projects/eyering/" class="profile-project-card">
            <div class="profile-project-card-thumb">
              <img src="https://cdn.ahlab.org/media/site/projects/eyering/eyering.jpg" alt="EyeRing" loading="lazy">
            </div>
            <div class="profile-project-card-body">
              <h5>EyeRing</h5>
              <div class="profile-project-card-tags"><span class="profile-project-card-tag" title="Body" aria-label="Body">
      <img class="profile-project-card-tag-default" src="https://ahlab.org/wp-content/uploads/2025/02/icon-body-1.png" alt="" loading="lazy">
      <img class="profile-project-card-tag-hover" src="https://ahlab.org/wp-content/uploads/2025/02/icon-body-hl.png" alt="" loading="lazy">
    </span><span class="profile-project-card-tag" title="Perceptual" aria-label="Perceptual">
      <img class="profile-project-card-tag-default" src="https://ahlab.org/wp-content/uploads/2025/02/icon-perceptual-1.png" alt="" loading="lazy">
      <img class="profile-project-card-tag-hover" src="https://ahlab.org/wp-content/uploads/2025/02/icon-perceptual-hl.png" alt="" loading="lazy">
    </span><span class="profile-project-card-tag" title="Identity" aria-label="Identity">
      <img class="profile-project-card-tag-default" src="https://ahlab.org/wp-content/uploads/2025/02/icon-identity.png" alt="" loading="lazy">
      <img class="profile-project-card-tag-hover" src="https://ahlab.org/wp-content/uploads/2025/02/icon-identity-hl.png" alt="" loading="lazy">
    </span></div>
            </div>
          </a>
      </aside>
      </div>
  </section>

</div>

<div id="site-footer-mount"></div>
<script src="/js/footer-include.js"></script>

<script>
const obs=new IntersectionObserver(e=>{e.forEach(n=>{if(n.isIntersecting)n.target.classList.add('vis')})},{threshold:.1});
document.querySelectorAll('.rv').forEach(el=>obs.observe(el));
document.querySelector('.nav-toggle')?.addEventListener('click',()=>{const l=document.querySelector('.nav-links');l.style.display=l.style.display==='flex'?'none':'flex'});
</script>
</body>
</html>
