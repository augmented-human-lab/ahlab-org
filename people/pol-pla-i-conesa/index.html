<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pol Pla i Conesa — Augmented Human Lab</title>
<link rel="stylesheet" href="https://use.typekit.net/zws2qzx.css">
<link rel="stylesheet" href="/css/theme.css">
<link rel="stylesheet" href="/css/people.css">
<link rel="icon" href="https://ahlab.org/wp-content/uploads/2021/05/cropped-Group@2x-32x32.png" sizes="32x32">
<meta name="description" content="Pol Pla i Conesa — Research Engineer at Augmented Human Lab.">
</head>
<body>

<div id="site-nav-mount"></div>
<script src="/js/nav-include.js"></script>

<!-- PAGE -->
<div class="container">

  <!-- Breadcrumb -->
  <div class="breadcrumb-bar">
    <a href="/people/">People</a>
    <span>→</span>
    <span style="color:var(--color-neutral-100)">Pol Pla i Conesa</span>
  </div>

  <!-- Hero -->
  <section class="profile-hero rv">
    <div class="profile-hero-grid">
      <div class="profile-photo">
        <img src="https://cdn.ahlab.org/media/site/people/pol-pla-i-conesa/pol-pla-i-conesa.jpg" alt="Pol Pla i Conesa">
      </div>
      <div class="profile-info">
        <h1>Pol Pla i Conesa</h1>
        <div class="profile-role">Research Engineer</div>
        
        
      </div>
    </div>
  </section>

  <!-- Body -->
  <section class="profile-body">
    <div class="profile-content rv">
        <p>Pol is a Research Engineer at Samsung ThinkTankTeam, Mountain View, USA. Pol designed the AH Lab logo back in 2013.</p>
        <p>More about Pol: http://polpla.cat/</p>
      </div>
  </section>

  <!-- Back -->
  <div class="back-strip rv">
    <a href="/people/" class="back-link">← All People</a>
  </div>

</div>

<div id="site-footer-mount"></div>
<script src="/js/footer-include.js"></script>

<script>
const obs=new IntersectionObserver(e=>{e.forEach(n=>{if(n.isIntersecting)n.target.classList.add('vis')})},{threshold:.1});
document.querySelectorAll('.rv').forEach(el=>obs.observe(el));
document.querySelector('.nav-toggle')?.addEventListener('click',()=>{const l=document.querySelector('.nav-links');l.style.display=l.style.display==='flex'?'none':'flex'});
</script>
</body>
</html>
