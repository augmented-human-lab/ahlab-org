<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Katja Holtta-Otto — Augmented Human Lab</title>
<link rel="stylesheet" href="https://use.typekit.net/zws2qzx.css">
<link rel="stylesheet" href="/css/theme.css">
<link rel="stylesheet" href="/css/people.css">
<link rel="icon" href="https://ahlab.org/wp-content/uploads/2021/05/cropped-Group@2x-32x32.png" sizes="32x32">
<meta name="description" content="Katja Holtta-Otto — Professor at Augmented Human Lab.">
</head>
<body>

<div id="site-nav-mount"></div>
<script src="/js/nav-include.js"></script>

<!-- PAGE -->
<div class="container">

  <!-- Hero -->
  <section class="profile-hero rv">
    <div class="profile-hero-grid">
      <div class="profile-photo">
        <img src="https://cdn.ahlab.org/media/site/people/katja-holtta-otto/katja-holtta-otto.jpg" alt="Katja Holtta-Otto">
      </div>
      <div class="profile-info">
        <h1>Katja Holtta-Otto</h1>
        <div class="profile-role">Professor</div>
        
        
      </div>
    </div>
  </section>

  <!-- Body -->
  <section class="profile-body">
    <div class="profile-content rv">
        <p>Katja Holtta-Otto is an Associate Professor at Aalto University.</p>
        <p>More about Katja Holtta-Otto: https://people.aalto.fi/new/katja.holtta-otto/</p>
      </div><div class="rv rv-d1" style="margin-top:60px">
        <div class="sidebar-section-title">Projects</div>
        <div class="profile-projects-grid">
          
          <a href="/projects/kyanite/" class="profile-project-card">
            <div class="profile-project-card-thumb">
              <img src="https://cdn.ahlab.org/media/site/projects/kyanite/kyanite.jpg" alt="Kyanite" loading="lazy">
            </div>
            <h5>Kyanite</h5>
          </a>
        </div>
      </div>
  </section>

</div>

<div id="site-footer-mount"></div>
<script src="/js/footer-include.js"></script>

<script>
const obs=new IntersectionObserver(e=>{e.forEach(n=>{if(n.isIntersecting)n.target.classList.add('vis')})},{threshold:.1});
document.querySelectorAll('.rv').forEach(el=>obs.observe(el));
document.querySelector('.nav-toggle')?.addEventListener('click',()=>{const l=document.querySelector('.nav-links');l.style.display=l.style.display==='flex'?'none':'flex'});
</script>
</body>
</html>
