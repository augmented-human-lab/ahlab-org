<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My AHL — Augmented Human Lab</title>
<link rel="stylesheet" href="https://use.typekit.net/zws2qzx.css">
<link rel="stylesheet" href="/css/theme.css">
<link rel="stylesheet" href="/css/auth.css">
<style>
/* ── My AHL page styles ──────────────────────────────────
   Minimal for now — a themed hero, a state panel that
   switches between "please sign in" and "welcome".
   The auth slot in the nav handles the actual login UI;
   this page just reads from window.AHLAuth.getUser() and
   re-renders when it changes. */

.myahl-hero {
  min-height: 48vh;
  background: var(--gradient);
  display: flex;
  align-items: flex-end;
  padding: 160px 0 60px;
  color: #fff;
}
.myahl-hero h1 {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 48px;
  line-height: 1.1;
  letter-spacing: -.01em;
}
.myahl-hero .sub {
  font-size: 18px;
  line-height: 1.6;
  opacity: .85;
  margin-top: 16px;
  max-width: 560px;
}
@media (max-width: 767px) {
  .myahl-hero { padding: 120px 0 48px; min-height: 40vh; }
  .myahl-hero h1 { font-size: 32px; }
  .myahl-hero .sub { font-size: 16px; }
}

.myahl-main {
  padding: 80px 0 120px;
  background: var(--color-neutral-20);
  min-height: 40vh;
}
.myahl-card {
  background: var(--color-neutral-10);
  border: 1px solid var(--color-neutral-30);
  border-radius: var(--radius-lg);
  padding: 48px;
  max-width: 720px;
  margin: 0 auto;
}
.myahl-card h2 {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 28px;
  margin-bottom: 16px;
  color: var(--color-neutral-100);
}
.myahl-card p {
  font-size: 16px;
  line-height: 1.65;
  color: var(--color-neutral-80);
  margin-bottom: 12px;
}
.myahl-cta {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  margin-top: 20px;
  padding: 14px 28px;
  background: var(--color-accent);
  color: #fff;
  font-family: var(--font-text);
  font-weight: 500;
  font-size: 15px;
  border: 0;
  border-radius: 999px;
  cursor: pointer;
  transition: background .2s;
}
.myahl-cta:hover { background: var(--color-accent-dark); }

.myahl-coming-soon {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 16px;
  margin-top: 32px;
}
.myahl-coming-soon li {
  padding: 20px;
  background: var(--color-neutral-20);
  border-radius: var(--radius);
  font-size: 14px;
  color: var(--color-neutral-80);
  border-left: 3px solid var(--color-accent-light);
}
.myahl-coming-soon li strong {
  display: block;
  color: var(--color-neutral-100);
  font-family: var(--font-display);
  font-weight: 600;
  margin-bottom: 4px;
}
@media (max-width: 767px) {
  .myahl-card { padding: 28px 20px; border-radius: var(--radius); }
}

/* Sign-out button — sits at the bottom of the signed-in card.
   Subtle red so it's clearly a destructive-ish action without
   being alarming. Lives here so mobile users have an obvious
   sign-out affordance (the nav drawer doesn't surface one). */
.myahl-logout-row {
  margin-top: 36px;
  padding-top: 24px;
  border-top: 1px solid var(--color-neutral-30);
  display: flex;
  justify-content: flex-start;
}
.myahl-logout {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 10px 20px;
  background: transparent;
  color: #dc2626;
  font-family: var(--font-text);
  font-weight: 500;
  font-size: 14px;
  border: 1px solid #fca5a5;
  border-radius: 999px;
  cursor: pointer;
  transition: background .2s, color .2s, border-color .2s;
}
.myahl-logout:hover {
  background: #fee2e2;
  border-color: #dc2626;
  color: #b91c1c;
}
</style>
</head>
<body>

<!-- Nav gets injected here by nav-include.js -->
<div id="site-nav-mount"></div>

<header class="myahl-hero">
  <div class="container">
    <h1 id="myahl-hero-title">My AHL</h1>
    <p class="sub" id="myahl-hero-sub">Your AHLab member dashboard.</p>
  </div>
</header>

<main class="myahl-main">
  <div class="container">
    <div class="myahl-card" id="myahl-card">
      <!-- Filled by the auth-aware script below. Default content
           covers the case where JS is disabled / failed to load —
           still looks reasonable and points users at the nav. -->
      <h2>Sign in to continue</h2>
      <p>This page is for AHLab members signed in with their <strong>@ahlab.org</strong> Google account.</p>
      <p>Use the <em>Member login</em> button in the top-right corner to sign in.</p>
    </div>
  </div>
</main>

<!-- Footer gets injected here by footer-include.js -->
<div id="site-footer-mount"></div>

<!-- Scripts: theme/nav/footer come from the shared pool; auth.js
     lives on every page that shows the nav (so the login chrome
     works everywhere), and the page-local script below handles
     the card content specific to /my-ahl/. -->
<script src="/js/nav-include.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/footer-include.js"></script>

<script>
/*
 * My AHL page controller.
 *
 * Reads the current user from window.AHLAuth and swaps the card
 * content accordingly. Subscribes to onChange so the view stays in
 * sync if the user signs in or out while this tab is open.
 *
 * Defensive: window.AHLAuth is set by auth.js, which loads right
 * above this script. If for any reason AHLAuth isn't available
 * (e.g. network error fetching auth.js), we leave the fallback
 * "please sign in" content alone.
 */
(function () {
  if (!window.AHLAuth) return;

  var card = document.getElementById('myahl-card');
  var heroTitle = document.getElementById('myahl-hero-title');
  var heroSub = document.getElementById('myahl-hero-sub');

  function render(user) {
    if (!user) {
      heroTitle.textContent = 'My AHL';
      heroSub.textContent = 'Your AHLab member dashboard.';
      card.innerHTML =
        '<h2>Sign in to continue</h2>' +
        '<p>This page is for AHLab members signed in with their <strong>@ahlab.org</strong> ' +
        'Google account.</p>' +
        '<p>Once signed in, you\u2019ll be able to update your public profile, add new ' +
        'projects, and submit awards and publications \u2014 all reviewed before going live.</p>' +
        '<button class="myahl-cta" type="button" id="myahl-signin">Sign in with Google</button>';
      var btn = document.getElementById('myahl-signin');
      if (btn) btn.addEventListener('click', function () { window.AHLAuth.login(); });
      return;
    }

    // Logged in. Greet the user by first name when we can parse one
    // from their display name; fall back to the full display name.
    var firstName = (user.name || user.email).split(' ')[0];
    heroTitle.textContent = 'Welcome back, ' + firstName;
    heroSub.textContent = 'Signed in as ' + user.email;

    var publicProfileHtml = '';
    if (user.person && user.person.slug) {
      publicProfileHtml =
        '<p>Your public profile: ' +
        '<a href="/people/' + escapeHtml(user.person.slug) + '/" ' +
        'style="color:var(--color-accent);text-decoration:underline">' +
        '/people/' + escapeHtml(user.person.slug) + '/</a></p>';
    } else {
      publicProfileHtml =
        '<p style="color:var(--color-neutral-70);font-size:14px">' +
        'We don\u2019t yet have a public profile linked to <code>' + escapeHtml(user.email) +
        '</code>. Once one is added to the site\u2019s people data, it will show here automatically.</p>';
    }

    card.innerHTML =
      '<h2>This is your home on the site.</h2>' +
      '<p>Right now there\u2019s nothing here, but the editing tools are coming.</p>' +
      publicProfileHtml +
      '<ul class="myahl-coming-soon">' +
        '<li><strong>Edit bio</strong>Update your public description, links, and photo.</li>' +
        '<li><strong>Add a project</strong>Draft a new project and submit it for review.</li>' +
        '<li><strong>Add a publication</strong>Paste a BibTeX entry or fill a form.</li>' +
        '<li><strong>Claim an award</strong>Attach press &amp; award mentions to your record.</li>' +
      '</ul>' +
      // Sign-out button. Lives here so mobile users (where the nav
      // drawer doesn't show an inline logout, by design) still have a
      // clear way out. Desktop users can use either this or the
      // nav-avatar → Logout flow.
      '<div class="myahl-logout-row">' +
        '<button class="myahl-logout" type="button" id="myahl-signout">Sign out</button>' +
      '</div>';

    var signoutBtn = document.getElementById('myahl-signout');
    if (signoutBtn) {
      signoutBtn.addEventListener('click', function () {
        window.AHLAuth.logout();
      });
    }
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, function (c) {
      return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
    });
  }

  window.AHLAuth.onChange(render);
})();
</script>

</body>
</html>
