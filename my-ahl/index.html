<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My AHL — Augmented Human Lab</title>
<link rel="stylesheet" href="https://use.typekit.net/zws2qzx.css">
<link rel="stylesheet" href="/css/theme.css">
<link rel="stylesheet" href="/css/auth.css">
<link rel="stylesheet" href="/css/myahl.css">
<link rel="stylesheet" href="/css/event-chip.css">
<style>
/* ── Hero (signed-out + signed-in) ─────────────────────────
   Stays here because it's the only myahl-specific layout that
   doesn't fit the dashboard-card pattern. Everything else is
   in /css/myahl.css. */
.myahl-hero {
  min-height: 28vh;
  display: flex;
  align-items: flex-end;
  padding: 140px 0 40px;
  color: #fff;

  /* Slow, subtle gradient drift. Same theme colors as the static
     --gradient — only their position in the canvas migrates. The
     4-stop loop (start → end → start → end) at 200%×200% size means
     only a quarter is visible at any moment; keyframes pan that
     quadrant through three corners with non-uniform timing so the
     motion feels organic rather than metronomic. ease-in-out + 22s
     cycle keeps any single moment imperceptible. */
  background:
    linear-gradient(
      221deg,
      var(--gradient-start) 0%,
      var(--gradient-end)   35%,
      var(--gradient-start) 70%,
      var(--gradient-end)   100%
    );
  background-size: 200% 200%;
  animation: myahl-hero-gradient-shift 22s ease-in-out infinite;
}
@keyframes myahl-hero-gradient-shift {
  0%, 100% { background-position: 0% 0%; }
  33%      { background-position: 100% 0%; }
  66%      { background-position: 0% 100%; }
}
@media (prefers-reduced-motion: reduce) {
  .myahl-hero { animation: none; }
}
.myahl-hero h1 {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 40px;
  line-height: 1.1;
  letter-spacing: -.01em;
}
.myahl-hero .sub {
  font-size: 16px;
  line-height: 1.6;
  opacity: .85;
  margin-top: 12px;
  max-width: 560px;
}
@media (max-width: 767px) {
  .myahl-hero { padding: 110px 0 32px; min-height: 24vh; }
  .myahl-hero h1 { font-size: 28px; }
}

.myahl-main {
  padding: 48px 0 96px;
  background: var(--color-neutral-20);
  min-height: 40vh;
}

/* ── Signed-out card (kept simple) ────────────────────────── */
.myahl-signin-card {
  background: var(--color-neutral-10);
  border: 1px solid var(--color-neutral-30);
  border-radius: var(--radius-lg);
  padding: 40px;
  max-width: 560px;
  margin: 0 auto;
}
.myahl-signin-card h2 {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 24px;
  margin-bottom: 12px;
  color: var(--color-neutral-100);
}
.myahl-signin-card p {
  font-size: 15px;
  line-height: 1.6;
  color: var(--color-neutral-80);
  margin-bottom: 12px;
}
.myahl-cta {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  margin-top: 16px;
  padding: 12px 24px;
  background: var(--color-accent);
  color: #fff;
  font-family: var(--font-text);
  font-weight: 500;
  font-size: 14px;
  border: 0;
  border-radius: 999px;
  cursor: pointer;
  transition: background .2s;
}
.myahl-cta:hover { background: var(--color-accent-dark); }
</style>
</head>
<body>

<!-- Nav gets injected here by nav-include.js -->
<div id="site-nav-mount"></div>

<header class="myahl-hero">
  <div class="container">
    <h1 id="myahl-hero-title">My AHL</h1>
    <p class="sub" id="myahl-hero-sub">Your AHLab member dashboard.</p>
  </div>
</header>

<!-- Inline SVG symbols used by tile icons + edit pencil. Hidden from
     layout via aria-hidden + sr-only-equivalent inline style; <use>
     references throughout the page resolve to these defs. -->
<svg xmlns="http://www.w3.org/2000/svg" style="display:none" aria-hidden="true">
  <symbol id="i-myahl-news" viewBox="0 0 24 24">
    <path d="M4 4h13a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H4z"/>
    <path d="M19 6h2v12a2 2 0 0 1-2 2"/>
    <path d="M8 8h7M8 12h7M8 16h4"/>
  </symbol>
  <symbol id="i-myahl-award" viewBox="0 0 24 24">
    <circle cx="12" cy="9" r="6"/>
    <path d="M8.5 14.5L7 22l5-3 5 3-1.5-7.5"/>
  </symbol>
  <symbol id="i-myahl-video" viewBox="0 0 24 24">
    <polygon points="10 8 16 12 10 16 10 8" fill="currentColor" stroke="none"/>
    <rect x="3" y="5" width="18" height="14" rx="2"/>
  </symbol>
  <symbol id="i-myahl-event" viewBox="0 0 24 24">
    <rect x="3" y="5" width="18" height="16" rx="2"/>
    <path d="M3 10h18M8 3v4M16 3v4"/>
  </symbol>
  <symbol id="i-myahl-edit" viewBox="0 0 24 24">
    <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4 12.5-12.5z"/>
  </symbol>
  <symbol id="i-myahl-wiki" viewBox="0 0 24 24">
    <!-- Open book — universal "knowledge / docs" glyph, sized to read
         clearly inside the 84px app-icon tile. -->
    <path d="M2 5h6.5A3.5 3.5 0 0 1 12 8.5V21a3 3 0 0 0-3-3H2z"/>
    <path d="M22 5h-6.5A3.5 3.5 0 0 0 12 8.5V21a3 3 0 0 1 3-3h7z"/>
  </symbol>
</svg>

<main class="myahl-main">
  <div class="container" id="myahl-root">
    <!-- Signed-out fallback. Replaced after auth.js loads. -->
    <div class="myahl-signin-card">
      <h2>Sign in to continue</h2>
      <p>This page is for AHLab members signed in with their <strong>@ahlab.org</strong> Google account.</p>
      <p>Use the <em>Member login</em> button in the top-right corner to sign in.</p>
    </div>
  </div>
</main>

<!-- Footer gets injected here by footer-include.js -->
<div id="site-footer-mount"></div>

<script src="/js/nav-include.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/footer-include.js"></script>
<script src="/js/image-processor.js" defer></script>
<script src="/js/submit-patch.js" defer></script>
<script src="/js/pending-cache.js" defer></script>
<script src="/js/myahl-forms.js" defer></script>
<script src="/js/myahl-patches.js" defer></script>

<script>
/*
 * /my-ahl/ controller — renders the dashboard for the signed-in user.
 *
 *  - Subscribes to AHLAuth changes; re-renders on sign-in / sign-out.
 *  - When a user is signed in AND has a person.slug, fetches
 *    /data/user-dashboard/<slug>.json (built by build/build-myahl.js).
 *  - Renders 4 sections: projects / publications / events / press,
 *    each with a final disabled "Add new" tile to telegraph the
 *    forthcoming edit pipeline.
 *
 *  All "Add new" controls are intentionally inert (button[disabled])
 *  until we ship the Apps Script edit broker. Tooltips explain the
 *  state so users don't think it's broken.
 */
(function () {
  if (!window.AHLAuth) return;

  var root = document.getElementById('myahl-root');
  var heroTitle = document.getElementById('myahl-hero-title');
  var heroSub   = document.getElementById('myahl-hero-sub');

  // Cache fetched dashboards in-tab so re-renders (e.g., from auth
  // change events firing twice) don't re-fetch.
  var dashboardCache = {};

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, function (c) {
      return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
    });
  }

  function renderSignedOut() {
    heroTitle.textContent = 'My AHL';
    heroSub.textContent   = 'Your AHLab member dashboard.';
    root.innerHTML =
      '<div class="myahl-signin-card">' +
        '<h2>Sign in to continue</h2>' +
        '<p>This page is for AHLab members signed in with their <strong>@ahlab.org</strong> Google account.</p>' +
        '<p>Once signed in, you’ll be able to edit your profile, add new projects, and submit publications, awards, and events — all reviewed before going live.</p>' +
        '<button class="myahl-cta" type="button" id="myahl-signin">Sign in with Google</button>' +
      '</div>';
    var btn = document.getElementById('myahl-signin');
    if (btn) btn.addEventListener('click', function () { window.AHLAuth.login(); });
  }

  // ── Assistive-augmentation principle icons ────────────────
  // Same six principles + CDN icon URLs used by build-people.js. Kept
  // in sync manually — short list, low churn. Cards render an icon
  // strip on the glass overlay; hover swaps to the highlighted variant.
  var PRINCIPLE_BY_KEY = {
    body:         { name: 'Body',         icon: 'https://cdn.ahlab.org/media/site/icon-body-1.png',         iconHover: 'https://cdn.ahlab.org/media/site/icon-body-hl.png' },
    cognitive:    { name: 'Cognitive',    icon: 'https://cdn.ahlab.org/media/site/icon-cognitive-1.png',    iconHover: 'https://cdn.ahlab.org/media/site/icon-cognitive-hl.png' },
    perceptual:   { name: 'Perceptual',   icon: 'https://cdn.ahlab.org/media/site/icon-perceptual-1.png',   iconHover: 'https://cdn.ahlab.org/media/site/icon-perceptual-hl.png' },
    physical:     { name: 'Physical',     icon: 'https://cdn.ahlab.org/media/site/icon-physical-1.png',     iconHover: 'https://cdn.ahlab.org/media/site/icon-physical-hl.png' },
    identity:     { name: 'Identity',     icon: 'https://cdn.ahlab.org/media/site/icon-identity.png',       iconHover: 'https://cdn.ahlab.org/media/site/icon-identity-hl.png' },
    sociocultural:{ name: 'Sociocultural',icon: 'https://cdn.ahlab.org/media/site/icon-sociocultural-1.png',iconHover: 'https://cdn.ahlab.org/media/site/icon-sociocultural-hl.png' }
  };

  function renderPrincipleTags(tags) {
    if (!Array.isArray(tags) || !tags.length) return '';
    var icons = tags
      .map(function (k) { return PRINCIPLE_BY_KEY[k]; })
      .filter(Boolean)
      .map(function (p) {
        return '<span class="myahl-project-tag" title="' + escapeHtml(p.name) + '" aria-label="' + escapeHtml(p.name) + '">' +
          '<img class="myahl-project-tag-default" src="' + escapeHtml(p.icon) + '" alt="" loading="lazy">' +
          '<img class="myahl-project-tag-hover" src="' + escapeHtml(p.iconHover) + '" alt="" loading="lazy">' +
        '</span>';
      })
      .join('');
    return icons ? '<div class="myahl-project-tags">' + icons + '</div>' : '';
  }

  // Edit-pencil button — disabled state, same tooltip across all cards
  // until the edit pipeline ships. The optional `extraClass` lets the
  // pub list override its absolute positioning to align with its counter.
  function editButton(extraClass) {
    var cls = 'myahl-edit' + (extraClass ? ' ' + extraClass : '');
    return '<button type="button" class="' + cls + '" disabled aria-label="Edit" ' +
      'title="Coming soon — the editing pipeline is being wired up.">' +
      '<svg aria-hidden="true"><use href="#i-myahl-edit"/></svg>' +
    '</button>';
  }

  // ── Section renderers ─────────────────────────────────────
  // Each returns a fragment of HTML. The "add new" tile is included
  // as the last element of the grid/list so it shows up at the end
  // (or as the only item when the section is empty for this user).

  function projectCardHTML(p) {
    var thumb = p.thumbnail
      ? '<div class="myahl-project-thumb"><img src="' + escapeHtml(p.thumbnail) + '" alt="' + escapeHtml(p.title) + '" loading="lazy"></div>'
      : '<div class="myahl-project-thumb"><div class="myahl-project-thumb-placeholder">' + escapeHtml(p.title.charAt(0)) + '</div></div>';
    return '<div class="myahl-project-wrap">' +
      '<a href="/projects/' + escapeHtml(p.slug) + '/" class="myahl-project-card">' +
        thumb +
        '<div class="myahl-project-body">' +
          '<h5>' + escapeHtml(p.title) + '</h5>' +
          renderPrincipleTags(p.principles) +
        '</div>' +
      '</a>' +
      editButton() +
    '</div>';
  }

  // Publications: numbered <li> rows with title link + citation + pill
  // DOI/PDF buttons. Wrapper is <li> not <a> — nesting the pill <a>s
  // inside an outer <a> would silently strip them out of the card on
  // render (invalid HTML). Title alone is the link.
  function pubItemHTML(p) {
    var url = '/publications/#' + encodeURIComponent(p.slug);
    var titleEl = '<a href="' + escapeHtml(url) + '" class="myahl-pub-title">' + escapeHtml(p.title) + '</a>';
    var awardHTML = p.award ? '<div class="myahl-pub-award">★ ' + escapeHtml(p.award) + '</div>' : '';
    var citationHTML = p.citation ? '<div class="myahl-pub-citation">' + escapeHtml(p.citation) + '</div>' : '';
    var linksHTML = '';
    if (Array.isArray(p.links) && p.links.length) {
      linksHTML = '<div class="myahl-pub-links">' + p.links.map(function (l) {
        return '<a href="' + escapeHtml(l.url) + '" target="_blank" rel="noopener" class="myahl-pub-link">' +
          escapeHtml(String(l.label || '').toUpperCase()) + '</a>';
      }).join('') + '</div>';
    }
    return '<li class="myahl-pub-item">' +
      awardHTML +
      titleEl +
      citationHTML +
      linksHTML +
      editButton('myahl-pub-edit') +
    '</li>';
  }

  // Events / press tile — shared shape, only the type icon differs.
  // `iconType` is one of "news" | "video" | "award" | "event"; the
  // matching <symbol id="i-myahl-<type>"> defined inline at the top of
  // the body provides the SVG glyph.
  function tileHTML(opts) {
    // opts: { iconType, href, target, title, meta, summary }
    var titleEl = opts.href
      ? '<a class="myahl-tile-title" href="' + escapeHtml(opts.href) + '"' + (opts.target || '') + '>' + escapeHtml(opts.title) + '</a>'
      : '<div class="myahl-tile-title">' + escapeHtml(opts.title) + '</div>';
    return '<div class="myahl-tile">' +
      '<div class="myahl-tile-icon ' + escapeHtml(opts.iconType) + '">' +
        '<svg aria-hidden="true"><use href="#i-myahl-' + escapeHtml(opts.iconType) + '"/></svg>' +
      '</div>' +
      '<div class="myahl-tile-body">' +
        titleEl +
        (opts.meta    ? '<div class="myahl-tile-meta">' + escapeHtml(opts.meta) + '</div>' : '') +
        (opts.summary ? '<div class="myahl-tile-summary">' + escapeHtml(opts.summary) + '</div>' : '') +
      '</div>' +
      editButton() +
    '</div>';
  }

  function eventTileHTML(e) {
    var href = e.url || ('/events/' + encodeURIComponent(e.slug) + '/');
    var isExternal = /^https?:/.test(href);
    var dateStr = e.starts ? new Date(e.starts).toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' }) : null;
    return tileHTML({
      iconType: 'event',
      href: href,
      target: isExternal ? ' target="_blank" rel="noopener"' : '',
      title: e.title,
      meta: [e.location, dateStr].filter(Boolean).join(' · '),
      summary: e.summary || ''
    });
  }

  function pressTileHTML(p) {
    var iconType = (p.type === 'video' || p.type === 'award') ? p.type : 'news';
    var meta = [p.outlet, p.year].filter(Boolean).join(' · ');
    return tileHTML({
      iconType: iconType,
      href: p.url || null,
      target: p.url ? ' target="_blank" rel="noopener"' : '',
      title: p.title,
      meta: meta,
      summary: ''
    });
  }

  // Three add-new shapes — each mirrors its section's card.
  // All are <button disabled> with a shared tooltip until the edit
  // pipeline ships. Always returned by render functions as the
  // leading item of their grid/list.
  var ADDNEW_TIP = 'Coming soon — the editing pipeline is being wired up.';

  // ── Resources ─────────────────────────────────────────────
  // Static list for now — bookmark-style links to internal AHLab
  // services. Edit pipeline integration will eventually let members
  // pin their own resources, hence the disabled "Add new" tile.
  // SVG glyph maps to a <symbol> defined inline at the top of <body>.
  var RESOURCES = [
    { label: 'Wiki', href: 'https://wiki.ahlab.org', symbol: 'i-myahl-wiki' }
  ];

  function resourceCardHTML(r) {
    return '<a class="myahl-resource" href="' + escapeHtml(r.href) + '" target="_blank" rel="noopener">' +
      '<div class="myahl-resource-icon">' +
        '<svg aria-hidden="true"><use href="#' + escapeHtml(r.symbol) + '"/></svg>' +
      '</div>' +
      '<div class="myahl-resource-label">' + escapeHtml(r.label) + '</div>' +
    '</a>';
  }

  function addNewResource(label) {
    return '<button type="button" class="myahl-resource myahl-resource-addnew" disabled title="' + ADDNEW_TIP + '">' +
      '<div class="myahl-resource-icon" aria-hidden="true">+</div>' +
      '<div class="myahl-resource-label">' + escapeHtml(label) + '</div>' +
    '</button>';
  }

  function addNewProjectCard(label) {
    return '<button type="button" class="myahl-addnew-base myahl-addnew-project" disabled title="' + ADDNEW_TIP + '">' +
      '<span class="myahl-addnew-plus" aria-hidden="true">+</span>' +
      '<span>' + escapeHtml(label) + '</span>' +
    '</button>';
  }

  function addNewTile(label) {
    // Same shape as .myahl-tile (44px icon + body) so it slots into
    // the 2-column tile grid as just another tile.
    return '<button type="button" class="myahl-addnew-base myahl-addnew-tile" disabled title="' + ADDNEW_TIP + '">' +
      '<span class="myahl-addnew-plus-circle" aria-hidden="true">+</span>' +
      '<span>' + escapeHtml(label) + '</span>' +
    '</button>';
  }

  function addNewPubRow(label) {
    // Wrapped in a plain <li> so it lives INSIDE the <ol> (HTML
    // requires <ol> children to be <li>). The plain <li> doesn't carry
    // the .myahl-pub-item class — and the counter-increment is on
    // .myahl-pub-item, not on every li — so the numbering stays clean
    // (real publications still read as 01, 02, 03 …).
    return '<li>' +
      '<button type="button" class="myahl-addnew-base myahl-addnew-pub" disabled title="' + ADDNEW_TIP + '">' +
        '<span class="myahl-addnew-plus" aria-hidden="true">+</span>' +
        '<span>' + escapeHtml(label) + '</span>' +
      '</button>' +
    '</li>';
  }

  function sectionHeaderHTML(title, count) {
    return '<div class="myahl-section-header">' +
      '<h2>' + escapeHtml(title) + '</h2>' +
      '<div class="myahl-section-count">' + count + (count === 1 ? ' item' : ' items') + '</div>' +
    '</div>';
  }

  function renderDashboard(d) {
    var profileHTML =
      '<div class="myahl-profile-tile">' +
        '<div class="myahl-profile-photo">' +
          (d.profile_image ? '<img src="' + escapeHtml(d.profile_image) + '" alt="' + escapeHtml(d.name) + '">' : '') +
        '</div>' +
        '<div class="myahl-profile-info">' +
          '<h2>' + escapeHtml(d.name) + '</h2>' +
          (d.role ? '<div class="role">' + escapeHtml(d.role) + '</div>' : '') +
          (d.profile_url ? '<a class="public-link" href="' + escapeHtml(d.profile_url) + '">View public profile</a>' : '') +
        '</div>' +
        '<button type="button" class="myahl-profile-edit" disabled title="Coming soon — the editing pipeline is being wired up.">Edit profile</button>' +
      '</div>';

    // Each section leads with its add-new tile, sized to match the
    // shape of the cards/tiles that follow.
    var projectsHTML =
      '<section class="myahl-section">' +
        sectionHeaderHTML('My Projects', d.projects.length) +
        '<div class="myahl-projects-grid">' +
          addNewProjectCard('Add new project') +
          d.projects.map(projectCardHTML).join('') +
        '</div>' +
      '</section>';

    // Pub addnew leads the <ol> as a plain <li> wrapper so the
    // counter still reads 01, 02, 03 for actual publications.
    var pubsHTML =
      '<section class="myahl-section">' +
        sectionHeaderHTML('My Publications', d.publications.length) +
        '<ol class="myahl-pub-list">' +
          addNewPubRow('Add new publication') +
          d.publications.map(pubItemHTML).join('') +
        '</ol>' +
      '</section>';

    var eventsHTML =
      '<section class="myahl-section">' +
        sectionHeaderHTML('My Events', d.events.length) +
        '<div class="myahl-tile-grid">' +
          addNewTile('Add new event') +
          d.events.map(eventTileHTML).join('') +
        '</div>' +
      '</section>';

    var pressHTML =
      '<section class="myahl-section">' +
        sectionHeaderHTML('My Press', d.press.length) +
        '<div class="myahl-tile-grid">' +
          addNewTile('Add new press mention') +
          d.press.map(pressTileHTML).join('') +
        '</div>' +
      '</section>';

    // Resources — organization-wide tools (Wiki etc), shared across
    // members. Rendered last to mirror the dashboard's "your stuff"
    // → "lab tools" top-to-bottom flow. Static list for now; member-
    // pinned resources land here later via the edit pipeline.
    var resourcesHTML =
      '<section class="myahl-section">' +
        sectionHeaderHTML('Our Resources', RESOURCES.length) +
        '<div class="myahl-resources-grid">' +
          addNewResource('Add new') +
          RESOURCES.map(resourceCardHTML).join('') +
        '</div>' +
      '</section>';

    var logoutHTML =
      '<div class="myahl-logout-row">' +
        '<button class="myahl-logout" type="button" id="myahl-signout">Sign out</button>' +
      '</div>';

    root.innerHTML = profileHTML + projectsHTML + pubsHTML + eventsHTML + pressHTML + resourcesHTML + logoutHTML;

    var signoutBtn = document.getElementById('myahl-signout');
    if (signoutBtn) signoutBtn.addEventListener('click', function () { window.AHLAuth.logout(); });

    // Anything that's now in the user's authoritative dashboard
    // already published — drop matching entries from the local
    // pending cache before myahl-patches.js renders. Otherwise the
    // tile would linger until the 7-day TTL expires.
    if (window.AHLPendingCache) {
      var covered = []
        .concat((d.projects     || []).map(function (x) { return { targetType: 'project',     action: 'create', targetSlug: x.slug, patch: { slug: x.slug, title: x.title } }; }))
        .concat((d.publications || []).map(function (x) { return { targetType: 'publication', action: 'create', targetSlug: x.slug, patch: { slug: x.slug, title: x.title } }; }))
        .concat((d.press        || []).map(function (x) { return { targetType: 'press',       action: 'create', targetSlug: x.slug, patch: { slug: x.slug, title: x.title } }; }));
      window.AHLPendingCache.pruneCovered(covered);
    }

    // Tell myahl-patches.js the grid markup is in place so it can
    // overlay pending tiles (cache + broker response).
    document.dispatchEvent(new CustomEvent('myahl:dashboard-rendered'));
  }

  // Signed-in but not yet linked to a person record (e.g. email
  // not in /data/auth-index.json). Show a friendly message rather
  // than a broken dashboard.
  function renderSignedInButUnlinked(user) {
    var firstName = (user.name || user.email).split(' ')[0];
    heroTitle.textContent = 'Welcome, ' + firstName;
    heroSub.textContent   = 'Signed in as ' + user.email;
    root.innerHTML =
      '<div class="myahl-signin-card">' +
        '<h2>No matching profile</h2>' +
        '<p>We couldn’t find a public profile linked to <code>' + escapeHtml(user.email) +
        '</code>. Once a record with this email is added to the site, your dashboard will appear here.</p>' +
        '<div class="myahl-logout-row" style="margin-top:24px;padding-top:16px">' +
          '<button class="myahl-logout" type="button" id="myahl-signout">Sign out</button>' +
        '</div>' +
      '</div>';
    var btn = document.getElementById('myahl-signout');
    if (btn) btn.addEventListener('click', function () { window.AHLAuth.logout(); });
  }

  function fetchDashboard(slug) {
    if (dashboardCache[slug]) return Promise.resolve(dashboardCache[slug]);
    return fetch('/data/user-dashboard/' + encodeURIComponent(slug) + '.json', { cache: 'default' })
      .then(function (r) { return r.ok ? r.json() : null; })
      .then(function (json) { dashboardCache[slug] = json; return json; })
      .catch(function () { return null; });
  }

  function render(user) {
    if (!user) return renderSignedOut();

    var firstName = (user.name || user.email).split(' ')[0];
    heroTitle.textContent = 'Welcome back, ' + firstName;
    heroSub.textContent   = 'Signed in as ' + user.email;

    var slug = user.person && user.person.slug;
    if (!slug) return renderSignedInButUnlinked(user);

    fetchDashboard(slug).then(function (dashboard) {
      if (!dashboard) {
        // Slug resolved from auth-index but dashboard file missing
        // (build out of date, or person lost their email after build).
        // Fall back to the unlinked state with a slightly different
        // message — same UX, no crash.
        return renderSignedInButUnlinked(user);
      }
      renderDashboard(dashboard);
    });
  }

  window.AHLAuth.onChange(render);
})();
</script>

</body>
</html>
