<script>
/*
 * Scroll-reveal: fade .rv elements in as they enter the viewport.
 * threshold:0 (any overlap triggers) instead of a percentage, so tall
 * elements always qualify on phones. Unobserve once visible since the
 * transition is one-way.
 */
const obs = new IntersectionObserver((entries, observer) => {
  entries.forEach(n => {
    if (n.isIntersecting) {
      n.target.classList.add('vis');
      observer.unobserve(n.target);
    }
  });
}, { threshold: 0, rootMargin: '0px 0px -40px 0px' });
document.querySelectorAll('.rv').forEach(el => obs.observe(el));
</script>
